<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sergi Tavartkiladze</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0f1a;
  color:white;
  overflow-x:hidden;
}

header{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

h1{font-size:3rem;margin:0;}

.btn{
  padding:12px 25px;
  border-radius:30px;
  text-decoration:none;
  margin:5px;
  display:inline-block;
  transition:0.3s;
}

.btn:hover{transform:translateY(-3px) scale(1.05);}

.btn-primary{background:#4facfe;color:white;}
.btn-secondary{border:1px solid #555;color:white;}

.image-slot{
  width:200px;height:200px;
  border:2px dashed #444;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:20px;
  color:#777;
}

section{padding:60px 20px;max-width:900px;margin:auto;}

.hidden{opacity:0;transform:translateY(40px);transition:0.8s;}
.show{opacity:1;transform:translateY(0);}

/* flying meme */
#flyingThing{
  position:fixed;
  top:20%;
  left:-200px;
  width:150px;
  pointer-events:none;
  z-index:9999;
  transition:transform 2s linear;
}

</style>
</head>

<body>

<img id="flyingThing" src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif">

<header>
  <h1>Sergi Tavartkiladze</h1>
  <p>Student & Aspiring Programmer</p>

  <a href="resume.pdf" class="btn btn-primary" target="_blank">Resume</a>
  <a href="https://github.com/Sylastian" class="btn btn-secondary" target="_blank">GitHub</a>

  <div class="image-slot">
    <!-- Will add image later -->
    Add image later
  </div>
</header>

<section class="hidden">
<h2>About</h2>
<p>I’m a student learning programming and building real skills step by step.</p>
</section>

<section class="hidden">
<h2>Skills</h2>
<p>Python, HTML, CSS, Java, SQL, Blender</p>
</section>

<script>

// scroll reveal but named badly
const revealGoblin = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('show');
    }
  });
});

document.querySelectorAll('.hidden').forEach(x=>revealGoblin.observe(x));

// easter egg chaos
const cursedButton = document.body;

cursedButton.addEventListener('click', ()=>{
  const rng = Math.floor(Math.random()*100);

  // 1% chance
  if(rng === 69){
    const flying = document.getElementById('flyingThing');

    flying.style.transform = "translateX(120vw) rotate(720deg)";

    setTimeout(()=>{
      flying.style.transform = "translateX(-200px)";
    },2000);
  }
});

// bonus dumb console easter egg
console.log("if you're reading this you're nosy");

</script>

</body>
</html>
