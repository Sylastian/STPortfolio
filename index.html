<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sergi Tavartkiladze | Developer Portfolio</title>

<meta name="description" content="Portfolio of Sergi Tavartkiladze - aspiring developer building modern web projects.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<style>
body{margin:0;font-family:'Inter';background:#050816;color:white}

/* NAV */
.nav{position:fixed;width:100%;top:0;padding:20px;backdrop-filter:blur(20px);display:flex;justify-content:space-between}

/* HERO */
.hero{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
h1{font-size:4rem}

/* CARDS */
.card{background:rgba(255,255,255,0.05);padding:30px;border-radius:20px;margin:40px}

/* PROJECTS */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.project{padding:20px;background:#111;border-radius:15px}

/* FORM */
input,textarea{width:100%;margin-top:10px;padding:10px;border-radius:10px;border:none}

/* BUTTON */
.btn{margin-top:15px;padding:12px;background:#60a5fa;border-radius:10px;cursor:pointer}

@media(max-width:800px){
.grid{grid-template-columns:1fr}
h1{font-size:2.5rem}
}
</style>
</head>

<body>

<div class="nav">
  <strong>STPortfolio</strong>
</div>

<div class="hero">
  <div>
    <h1>Sergi Tavartkiladze</h1>
    <p>Aspiring Developer</p>
  </div>
</div>

<section class="card">
<h2>Projects</h2>

<div class="grid" id="projects"></div>
</section>

<section class="card">
<h2>Contact Me</h2>

<form id="form">
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea placeholder="Message" required></textarea>
<button class="btn">Send</button>
</form>

</section>

<script>
// GITHUB PROJECTS
fetch("https://api.github.com/users/YOUR_USERNAME/repos")
.then(res=>res.json())
.then(data=>{
  const container=document.getElementById("projects");
  data.slice(0,4).forEach(repo=>{
    container.innerHTML+=`
      <div class="project">
        <h3>${repo.name}</h3>
        <p>${repo.description || "No description"}</p>
        <a href="${repo.html_url}" target="_blank">View</a>
      </div>
    `;
  });
});

// FORM (EMAILJS REQUIRED)
document.getElementById("form").onsubmit=e=>{
  e.preventDefault();
  alert("Message sent (connect EmailJS)");
};

// GSAP
gsap.from("h1",{y:100,opacity:0,duration:1});
gsap.from(".card",{scrollTrigger:".card",y:100,opacity:0,stagger:0.2});
</script>

</body>
</html>
